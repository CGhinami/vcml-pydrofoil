### General configuration ####################################################
system.name       = Addi example
system.config     = ${cfg}

system.throttle.rtf = 0
system.core.trace = 0

# Specify simulation duration. Simulation will stop automatically once this
# time-stamp is reached. Use integer values with suffixes s, ms, us or ns. If
# you want to simulate infinitely, leave this commented out.
#  system.duration = 2s

# TLM global quantum, a higher value improves performance but reduces timing
# accuracy. Use integer values with suffixes s, ms, us or ns.
# 100 instructions on a call of simulate (1 instr = 1 clk cycle)
system.quantum = 1ms
system.duration = 10000000s # --> 1k instructions --> 1ns/instr

# Clock frequency
system.clk_cpu.hz = 1000000000 # 1 GHz

### CPU configuration ########################################################
system.core.arch_name = "rv32"
system.core.verbose = false 
# system.core.gdb_port   = 5555
# system.core.gdb_wait   = true
system.core.symbols = ${dir}/zephyr.elf
system.core.pc = 0x80002000

# Memory configuration
system.core.elf = ${dir}/zephyr.elf
system.loader.images = ${dir}/zephyr.elf
# system.ram = 0x80000000..0x8006FFFF

system.fb0fps.hz = 24
system.fb0.format = a8r8g8b8
system.fb0.xres = 800
system.fb0.yres = 480
system.fb0.displays = sdl:5020
system.fb0.addr = 0x80800000



#system.ram.size     = 0x10000000    # 256MB
#system.ram.images = ${dir}/build/zephyr/zephyr.elf@0x00000000


# Terminal configuration
system.term.backends  = stdout # stdout|file|tap|null